<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Tofoo App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  </head>
  <body class="py-4">
    <div class="app mx-auto">
      <div class="h1">what's in my fridge?</div>
      <div class="d-flex justify-content-center mb-3">
        <button
          id="openNewModal"
          data-bs-toggle="modal"
          data-bs-target="#modal-add"
          style="border-radius: 5px; padding: 5px 10px;"
        >
          add an item
        </button>
      </div>
      <div id="todos" class="overflow-y-auto"></div>
    </div>

    <!-- modal dialog for adding -->
    <div id="modal-add" class="modal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" style="font-weight:bold;">add an item</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div id="new-todo-form">
              <div class="mb-3">
                <label for="title" class="form-label">item</label>
                <input type="text" class="form-control" id="title" />
              </div>
              <div class="mb-3">
                <label for="desc" class="form-label">amount</label>
                <textarea class="form-control" id="desc" rows="1"></textarea>
              </div>
              <div class="mb-3">
                <div class="mb-3">
                <label for="category" class="form-label">category</label>
                <select id="category" class="form-control">
                  <option value="">select category</option>
                  <option value="Produce">produce</option>
                  <option value="Pantry">pantry</option>
                  <option value="Protein">protein</option>
                  <option value="Base/Foundation">base/Foundation</option>
                  <option value="Condiments">condiments</option>
                  <option value="Misc.">misc.</option>
                </select>
              </div>
              </div>
              <div class="text-danger" id="msg"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button id="add-btn" type="button" class="add-btn">
              add
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- modal dialog for editing -->
    <div id="modal-edit" class="modal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">edit item</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div id="edit-todo-form">
              <div class="mb-3">
                <label for="titleEdit" class="form-label">item</label>
                <input type="text" class="form-control" id="titleEdit" />
              </div>
              <div class="mb-3">
                <label for="descEdit" class="form-label">amount</label>
                <textarea
                  class="form-control"
                  id="descEdit"
                  rows="1"
                ></textarea>
                <div class="mb-3">
                <label for="categoryEdit" class="form-label">category</label>
                <select id="categoryEdit" class="form-control">
                  <option value="">select category</option>
                  <option value="Produce">produce</option>
                  <option value="Pantry">pantry</option>
                  <option value="Protein">protein</option>
                  <option value="Base/Foundation">base/Foundation</option>
                  <option value="Condiments">condiments</option>
                  <option value="Misc.">misc.</option>
                </select>
              </div>
              </div>
              <div class="text-danger" id="msgEdit"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button id="edit-btn" type="button" class="right-btn">
              update item.
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="main.js"></script>
  </body>
</html>
